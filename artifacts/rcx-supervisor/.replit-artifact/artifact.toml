kind = "web"
previewPath = "/"
title = "RCX Supervisor View"
version = "1.0.0"
id = "artifacts/rcx-supervisor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26206

[services.development]
run = "pnpm --filter @workspace/rcx-supervisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rcx-supervisor", "run", "build" ]
publicDir = "artifacts/rcx-supervisor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26206"
BASE_PATH = "/"
